name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, validate, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Dead-code check (knip)
        run: bun run knip

      - name: Schema check
        run: bun run schema:check

      - name: Generate Zod schemas
        run: bun run schema:generate

      - name: Typecheck
        run: bun run typecheck

      - name: Validate data
        run: bun run validate

      - name: Reference check
        run: bun run check:references

      - name: Test
        run: bun run test

      # Catches dashboard build regressions (e.g. a removed dep, a bad
      # import) that typecheck alone misses. NOTE: this does NOT run
      # vercel.json's `buildCommand` — deploy-config changes still only
      # prove out on Vercel itself (see CLAUDE.md Definition of done #7).
      - name: Build dashboard
        run: bun run -F @onepiece-wiki/dashboard build
