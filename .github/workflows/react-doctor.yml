# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: React Doctor

on:
  # Scans the PR's changed files and posts a sticky summary comment listing only the new issues introduced relative to the merge base of the target branch.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Scans `main` on every push to track the health-score trend and catch regressions that slipped past PR review.
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancels any in-flight scan for the same PR (or branch, on push) the moment a new commit arrives, so reviewers only ever see the latest run.
concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: millionco/react-doctor@v2
        # Advisory for now: React Doctor reports findings on every PR (sticky
        # summary comment + inline review comments + a commit status with the
        # health score) but does NOT fail the check. This is deliberate — the
        # codebase has ~254 pre-existing findings (mostly react-hooks deps in
        # the dashboard god-modules); a blocking gate on day one would red-X
        # every PR. The action already reports only NEW issues vs the merge
        # base on PRs, so it acts as a ratchet. Graduate to blocking once the
        # legacy count is burned down (see the god-module decomposition task):
        # set `blocking: error` below.
        # Full reference: https://www.react.doctor/ci
        with:
          version: "0.5.2" # pinned to the devDependency for reproducibility
          # blocking: error   # ← flip on once the legacy findings are cleared
          # scope: full       # PRs scan changed files only by default (the ratchet)
