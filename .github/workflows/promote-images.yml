# Promote staged R2 objects to the public CDN prefix after the PR
# that introduced them merges.
#
# Flow (Phase 7.1, see ADR-015 + docs/IMAGES.md):
#   1. PR merges to main, possibly carrying entity JSON whose `url`
#      property is a `staging://pending/<key>` placeholder.
#   2. This workflow runs on push to main, finds those placeholders
#      in the diff, and for each one:
#        - S3-copies `pending/<key>` → `images/<key>` on R2
#          (preserves bytes; the public CDN serves `images/`).
#        - Opens a follow-up commit on main rewriting the
#          `staging://pending/<key>` URL to
#          `${R2_PUBLIC_BASE_URL}/images/<key>`.
#        - Best-effort deletes the `pending/` source. The R2
#          lifecycle rule on `pending/` (auto-purge > 14 days) is
#          the safety net if delete fails.
#   3. CI's build-pipeline guard fails any PR that ships
#      `staging://` URLs unrewritten — so a half-applied promotion
#      can't reach `main` twice.
#
# Required secrets (configure in repo Settings → Secrets):
#   R2_ACCOUNT_ID            same as the dashboard env
#   R2_ACCESS_KEY_ID         account-scoped, Object Read & Write
#   R2_SECRET_ACCESS_KEY     ditto
#   R2_BUCKET                bucket name
#   R2_PUBLIC_BASE_URL       https://images.example.com (no trailing /)
#
# The follow-up commit is authored by the github-actions[bot] +
# Co-authored-by the original PR's author so attribution survives.

name: Promote staged images

on:
  push:
    branches: [main]
    paths:
      - 'data/universes/**/entities/image/**'

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need parent commit for the diff

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root + scripts deps
        run: bun install --frozen-lockfile

      - name: Run promotion
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bun scripts/promote-staged-images.ts

      - name: Open follow-up commit (if any rewrites happened)
        run: |
          if git diff --quiet HEAD; then
            echo "No staging:// URLs to rewrite."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/universes
          git commit -m "chore(images): promote staged R2 objects to public prefix

Auto-generated by .github/workflows/promote-images.yml. Rewrites
staging:// URLs introduced in ${HEAD_SHA::7} to canonical public
URLs after copying the bytes from pending/ to images/ on R2."
          git push
